services:
  ziti-router:
    image: netfoundry/autonomous-router:latest
    container_name: middleware_ziti_router
    restart: unless-stopped
    network_mode: host
    pid: host
    cap_add:
      - NET_ADMIN
    environment:
      - REG_KEY=${REG_KEY}
      - TUNNEL_MODE=auto
    volumes:
      - /docker/configs/netfoundry:/etc/netfoundry

  dns-register:
    image: ubuntu:24.04
    container_name: middleware_ziti_dns_register
    restart: unless-stopped
    network_mode: host
    pid: host
    privileged: true
    entrypoint:
      - /bin/bash
      - -c
      - |
        IFACE=$$(nsenter -t 1 -m -- ip route show default | awk '{print $$5; exit}')
        HOST_IP=$$(nsenter -t 1 -m -- ip -4 addr show "$$IFACE" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | head -1)
        FALLBACK_DNS=$$(nsenter -t 1 -m -- resolvectl dns "$$IFACE" 2>/dev/null | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+' | grep -v "^$${HOST_IP}$$" | tr '\n' ' ')

        echo "Detected: iface=$$IFACE host_ip=$$HOST_IP fallback_dns=$$FALLBACK_DNS"

        sleep 45

        while true; do
          nsenter -t 1 -m -- iptables -t nat -C DOCKER -d 100.64.0.0/10 -j RETURN 2>/dev/null \
            || nsenter -t 1 -m -- iptables -t nat -I DOCKER -d 100.64.0.0/10 -j RETURN
          nsenter -t 1 -m -- resolvectl dns "$$IFACE" $$HOST_IP $$FALLBACK_DNS
          nsenter -t 1 -m -- resolvectl domain "$$IFACE" '~.'
          sleep 60
        done
    volumes: []
    depends_on:
      ziti-router:
        condition: service_started
