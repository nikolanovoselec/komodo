services:
  uptime-kuma:
    restart: unless-stopped
    container_name: middleware_uptime_kuma
    dns:
      - 100.64.0.2
      - 192.168.5.162
      - 192.168.5.92
    ports:
      - 3001:3001
    volumes:
      - /docker/configs/uptime-kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    image: louislam/uptime-kuma:1.23.17
    network_mode: bridge
