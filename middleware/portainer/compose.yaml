services:
    portainer-ce:
        image: 'portainer/portainer-ce:2.39.1'
        volumes:
            - '/docker/configs/portainer:/data'
            - '/var/run/docker.sock:/var/run/docker.sock'
        restart: always
        container_name: middleware_portainer
        dns:
            - 100.64.0.2
            - 192.168.5.162
            - 192.168.5.92
            - 192.168.2.29
        ports:
            - '9443:9443'
            - '8000:8000'