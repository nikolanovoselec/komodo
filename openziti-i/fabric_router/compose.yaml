services:
  ziti-router:
    image: openziti/ziti-router:1.6.14
    container_name: openziti_i_fabric_router_ziti_router
    restart: unless-stopped
    network_mode: host
    environment:
      - ZITI_ENROLL_TOKEN=${ZITI_ENROLL_TOKEN}
      - ZITI_CTRL_ADVERTISED_ADDRESS=swisspost.cloudziti.io
      - ZITI_ROUTER_ADVERTISED_ADDRESS=192.168.99.226
      - ZITI_ROUTER_PORT=3022
      - ZITI_ROUTER_MODE=none
    volumes:
      - /docker/configs/ziti-router:/ziti-router
