services:
  autonomous-router:
    container_name: docker_iii_aer
    image: netfoundry/autonomous-router:latest
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      - REG_KEY=${REG_KEY}
      - TUNNEL_MODE=auto
    volumes:
      - ./ziti_router:/etc/netfoundry
