[[action]]
name = "Docker Cleanup"
tags = ["sync"]
[action.config]
schedule_format = "Cron"
schedule = "0 40 4 * * *"
schedule_timezone = "Europe/Berlin"
webhook_enabled = false
file_contents = """
// Docker Cleanup - Prunes images, networks, volumes, and build cache
// on servers tagged "auto-cleanup"

const servers = await komodo.read("ListServers", {
  query: { tags: ["auto-cleanup"] },
});

console.log(`Found ${servers.length} servers to clean`);

for (const server of servers) {
  console.log();
  console.log("==================");
  console.log(`Cleaning: ${server.name}`);
  console.log("==================");

  try {
    console.log("Pruning images...");
    await komodo.execute_and_poll("PruneImages", { server: server.name });

    console.log("Pruning networks...");
    await komodo.execute_and_poll("PruneNetworks", { server: server.name });

    console.log("Pruning volumes...");
    await komodo.execute_and_poll("PruneVolumes", { server: server.name });

    console.log("Pruning build cache...");
    await komodo.execute_and_poll("PruneDockerBuilders", { server: server.name });

    console.log(`SUCCESS: ${server.name} cleaned`);
  } catch (error) {
    console.error(`FAILED: ${server.name} - ${error}`);
  }
}

console.log();
console.log("Cleanup complete!");
"""

