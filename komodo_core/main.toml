[[action]]
name = "Renovate"
tags = ["sync"]
[action.config]
schedule_format = "Cron"
schedule = "0 0 * * * *"
schedule_enabled = false
schedule_timezone = "Europe/Berlin"
webhook_enabled = false
file_contents = """
// Renovate - Self-hosted dependency update bot
// Runs on the tools server via ephemeral Docker container
// Token read from Komodo variables RENOVATE_PAT and DOCKERHUB_TOKEN

const tokenVar = await komodo.read("GetVariable", { name: "RENOVATE_PAT" });

if (!tokenVar || !tokenVar.value) {
  console.error("ERROR: RENOVATE_PAT variable not found in Komodo secrets");
  return;
}

const dockerhubVar = await komodo.read("GetVariable", { name: "DOCKERHUB_TOKEN" });

if (!dockerhubVar || !dockerhubVar.value) {
  console.error("ERROR: DOCKERHUB_TOKEN variable not found in Komodo secrets");
  return;
}

const servers = await komodo.read("ListServers", {});
const tools = servers.find(s => s.name === "tools");

if (!tools) {
  console.error("ERROR: tools server not found");
  return;
}

console.log("Starting Renovate on tools server...");

const envContent = [
  "RENOVATE_TOKEN=" + tokenVar.value,
  "RENOVATE_GIT_AUTHOR=Nikola Novoselec <nikolanovoselec@users.noreply.github.com>",
  "LOG_LEVEL=info",
  "RENOVATE_SECRETS=" + JSON.stringify({RENOVATE_GHCR_TOKEN: tokenVar.value, RENOVATE_DOCKERHUB_TOKEN: dockerhubVar.value}),
].join("\n");
const b64 = btoa(envContent);

await komodo.write("CreateTerminal", {
  server: tools.name,
  name: "renovate",
  command: "bash",
  recreate: Types.TerminalRecreateMode.DifferentCommand,
});

await komodo.execute_terminal(
  {
    server: tools.name,
    terminal: "renovate",
    command: "echo " + b64 + " | base64 -d > /tmp/renovate.env && docker run --rm --env-file /tmp/renovate.env renovate/renovate nikolanovoselec/komodo && rm -f /tmp/renovate.env",
  },
  {
    onLine: (line) => console.log(line),
    onFinish: (code) => {
      if (code === 0) {
        console.log("Renovate completed successfully");
      } else {
        console.error("Renovate exited with code " + code);
      }
    },
  },
);
"""

##

[[action]]
name = "Stop Disabled Stacks"
tags = ["sync"]
[action.config]
schedule_format = "Cron"
schedule = "0 0 * * * *"
schedule_timezone = "Europe/Berlin"
webhook_enabled = false
file_contents = """
// Stops all stacks tagged "disabled" - runs hourly

const stacks = await komodo.read("ListStacks", {
  query: { tags: ["disabled"] },
});

console.log(`Found ${stacks.length} stacks with "disabled" tag`);

for (const stack of stacks) {
  const runningStates = ["running", "unhealthy", "restarting"];
  if (runningStates.includes(stack.info.state)) {
    console.log(`Stopping: ${stack.name} (state: ${stack.info.state})`);
    try {
      await komodo.execute_and_poll("StopStack", { stack: stack.name });
      console.log(`SUCCESS: ${stack.name} stopped`);
    } catch (error) {
      console.error(`FAILED: ${stack.name} - ${error}`);
    }
  } else {
    console.log(`Already stopped: ${stack.name} (state: ${stack.info.state})`);
  }
}
"""

##

[[action]]
name = "Update & Clean Servers"
tags = ["sync"]
[action.config]
schedule_format = "Cron"
schedule = "0 0 6 * * *"
schedule_timezone = "Europe/Berlin"
webhook_enabled = false
file_contents = """
const servers = await komodo.read("ListServers", {
  query: { tags: ["auto-update"] },
});

for (const server of servers) {
  console.log();
  console.log("------------------");
  console.log("Updating", server.name);
  await komodo.write("CreateTerminal", {
    server: server.name,
    name: "apt-upgrade",
    command: "bash",
    recreate: Types.TerminalRecreateMode.DifferentCommand,
  });
  await komodo.execute_terminal(
    {
      server: server.name,
      terminal: "apt-upgrade",
      command:
        "export DEBIAN_FRONTEND=noninteractive && apt update && apt upgrade -y -o Dpkg::Options::='--force-confold' -o Dpkg::Options::='--force-confdef' && apt autoremove -y && apt clean && journalctl --vacuum-time=7d",
    },
    {
      onLine: console.log,
      onFinish: (code) => console.log("Finished", code),
    },
  );
}
"""

