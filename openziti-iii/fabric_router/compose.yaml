services:
  ziti-router:
    image: netfoundry/autonomous-router:latest
    container_name: openziti_iii_fabric_router
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      - REG_KEY=${REG_KEY}
      - TUNNEL_MODE=auto
    volumes:
      - /docker/configs/netfoundry:/etc/netfoundry
