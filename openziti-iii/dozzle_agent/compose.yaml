services:
  dozzle-agent:
    image: amir20/dozzle:v10.5.1
    container_name: openziti_iii_dozzle_agent
    command: agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - 7007:7007
    restart: unless-stopped
    environment:
    - DOZZLE_HOSTNAME=openziti_iii
    network_mode: bridge
