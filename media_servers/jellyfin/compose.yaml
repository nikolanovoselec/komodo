services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:10.11.11ubu2404-ls37
    container_name: media_servers_jellyfin
    network_mode: host #for local/remote stream discovery
    environment:
      - TZ=Europe/Zurich
      - JELLYFIN_PublishedServerUrl=https://jellyfin.novoselec.ch/ #optional
      - PUID=977
      - PGID=988
      - UMASK=002
    volumes:
      - /docker/configs/jellyfin:/config
      - /docker/configs/jellyfin/custom-cont-init.d:/custom-cont-init.d
      - /mnt/unas/Shows/:/data/tvshows
      - /mnt/unas/Movies/:/data/movies
      - /mnt/unas/Music/:/data/music
#    ports:
#      - 8095:8096
#      - 8920:8920 #optional
#      - 7359:7359/udp #optional
#      - 1900:1900/udp #optional
    devices:
      - /dev/dri:/dev/dri
    mem_limit: 1000m
    restart: unless-stopped
