services:
  tracearr:
    image: ghcr.io/connorgallopo/tracearr:v1.4.27
    container_name: media_servers_tracearr
    ports:
      - 3000:3000
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - TZ=Europe/Zurich
      - DATABASE_URL=postgres://tracearr:${TRACEARR_DB_PASSWORD}@timescale:5432/tracearr
      - REDIS_URL=redis://:${TRACEARR_REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${TRACEARR_JWT_SECRET}
      - COOKIE_SECRET=${TRACEARR_COOKIE_SECRET}
      - CORS_ORIGIN=${TRACEARR_CORS_ORIGIN}
      - LOG_LEVEL=info
    depends_on:
      timescale:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /docker/configs/tracearr/backups:/data/backup
    restart: unless-stopped
    networks:
      - tracearr
      - tracearr-db

  timescale:
    image: timescale/timescaledb-ha:pg18.1-ts2.25.0
    container_name: media_servers_tracearr_db
    shm_size: 512mb
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: postgres -c timescaledb.license=timescale -c timescaledb.max_tuples_decompressed_per_dml_transaction=0 -c max_locks_per_transaction=4096 -c timescaledb.telemetry_level=off
    environment:
      - POSTGRES_USER=tracearr
      - POSTGRES_PASSWORD=${TRACEARR_DB_PASSWORD}
      - POSTGRES_DB=tracearr
    volumes:
      - /docker/configs/tracearr/db:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracearr"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tracearr-db

  redis:
    image: redis:8-alpine
    container_name: media_servers_tracearr_redis
    command: redis-server --requirepass "${TRACEARR_REDIS_PASSWORD}" --appendonly yes
    volumes:
      - /docker/configs/tracearr/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${TRACEARR_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tracearr

networks:
  tracearr:
  tracearr-db:
