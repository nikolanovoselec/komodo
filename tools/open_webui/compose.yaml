services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.10.2
    container_name: tools_open_webui
    depends_on:
      - searxng
    ports:
      - "3001:8080"
    volumes:
      - /docker/configs/open_webui/data:/app/backend/data
    environment:
      ENABLE_OLLAMA_API: "False"
      ENABLE_OPENAI_API: "True"
      OPENAI_API_BASE_URL: ${CLOUDFLARE_AI_GATEWAY_BASE_URL}
      OPENAI_API_BASE_URLS: ${CLOUDFLARE_AI_GATEWAY_BASE_URL}
      OPENAI_API_KEY: ${CLOUDFLARE_AI_GATEWAY_API_KEY}
      OPENAI_API_KEYS: ${CLOUDFLARE_AI_GATEWAY_API_KEY}
      OPENAI_API_CONFIGS: '{"0":{"enable":true,"model_ids":["dynamic/freestyler"],"connection_type":"openai","provider":"llama.cpp"}}'
      DEFAULT_MODELS: dynamic/freestyler
      TASK_MODEL_EXTERNAL: dynamic/freestyler
      ENABLE_TITLE_GENERATION: "False"
      ENABLE_TAGS_GENERATION: "False"
      ENABLE_FOLLOW_UP_GENERATION: "False"
      WEBUI_SECRET_KEY: ${OPEN_WEBUI_SECRET_KEY}
      WEBUI_NAME: Codeflare Chat
      WEBUI_URL: https://chat.codeflare.ch
      CORS_ALLOW_ORIGIN: https://chat.codeflare.ch
      ENABLE_WEB_SEARCH: "True"
      WEB_SEARCH_ENGINE: searxng
      WEB_SEARCH_RESULT_COUNT: "5"
      WEB_SEARCH_CONCURRENT_REQUESTS: "10"
      SEARXNG_QUERY_URL: http://searxng:8080/search?q=<query>
      SEARXNG_LANGUAGE: all
      GITHUB_MCP_OAUTH_CLIENT_ID: ${GITHUB_MCP_OAUTH_CLIENT_ID:-}
      GITHUB_MCP_OAUTH_CLIENT_SECRET: ${GITHUB_MCP_OAUTH_CLIENT_SECRET:-}
      GITHUB_MCP_OAUTH_SCOPE: ${GITHUB_MCP_OAUTH_SCOPE:-repo read:org read:user user:email workflow}
      GITHUB_MCP_TOOLSETS: ${GITHUB_MCP_TOOLSETS:-repos,issues,pull_requests,actions,code_security}
      M365_MCP_OAUTH_CLIENT_ID: ${M365_MCP_OAUTH_CLIENT_ID:-}
      M365_MCP_OAUTH_CLIENT_SECRET: ${M365_MCP_OAUTH_CLIENT_SECRET:-}
      M365_MCP_OAUTH_SCOPE: ${M365_MCP_OAUTH_SCOPE:-api://e8c77dc2-69b3-43f4-bc51-3213c9d915b4/.default}
      DEFAULT_MODEL_METADATA: '{"capabilities":{"file_context":true,"vision":true,"file_upload":true,"web_search":true,"image_generation":false,"code_interpreter":false,"terminal":false,"citations":true,"status_updates":true,"builtin_tools":true},"defaultFeatureIds":["web_search"],"toolIds":["image_search","server:mcp:github"],"builtinTools":{"web_search":true,"image_generation":false,"code_interpreter":false,"memory":false,"chats":false,"notes":false,"knowledge":false,"channels":false,"tasks":false,"automations":false,"calendar":false}}'
      DEFAULT_MODEL_PARAMS: '{"function_calling":"native","stream_response":true,"stream_delta_chunk_size":1,"reasoning_format":"none","chat_template_kwargs":{"enable_thinking":false}}'
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        python3 - <<'PY'
        import asyncio
        import json
        import os
        import re
        import shutil
        import sqlite3
        import textwrap
        import time

        database = "/app/backend/data/webui.db"
        now = int(time.time())
        model_id = "dynamic/freestyler"
        image_search_tool_id = "image_search"
        force_tooling_function_id = "force_freestyler_tooling"
        gateway_base_url = os.environ["OPENAI_API_BASE_URL"]
        gateway_api_key = os.environ["OPENAI_API_KEY"]
        searxng_query_url = os.getenv("SEARXNG_QUERY_URL", "http://searxng:8080/search?q=<query>")
        webui_url = os.getenv("WEBUI_URL", "https://chat.codeflare.ch").rstrip("/")
        public_read_grant = {
            "principal_type": "user",
            "principal_id": "*",
            "permission": "read",
        }

        env_file = "/app/backend/open_webui/env.py"
        with open(env_file) as file:
            env_content = file.read()
        env_content = env_content.replace(
            "WEBUI_NAME = os.getenv('WEBUI_NAME', 'Open WebUI')\n"
            "if WEBUI_NAME != 'Open WebUI':\n"
            "    WEBUI_NAME += ' (Open WebUI)'\n",
            "WEBUI_NAME = os.getenv('WEBUI_NAME', 'Open WebUI')\n",
        )
        with open(env_file, "w") as file:
            file.write(env_content)

        branding_dir = "/app/backend/data/branding"
        branding_files = {
            "favicon.png": [
                "/app/backend/open_webui/static/favicon.png",
                "/app/build/static/favicon.png",
                "/app/build/favicon.png",
            ],
            "favicon.svg": [
                "/app/backend/open_webui/static/favicon.svg",
                "/app/build/static/favicon.svg",
            ],
            "favicon-96x96.png": [
                "/app/backend/open_webui/static/favicon-96x96.png",
                "/app/build/static/favicon-96x96.png",
            ],
            "favicon.ico": [
                "/app/backend/open_webui/static/favicon.ico",
                "/app/build/static/favicon.ico",
            ],
            "apple-touch-icon.png": [
                "/app/backend/open_webui/static/apple-touch-icon.png",
                "/app/build/static/apple-touch-icon.png",
            ],
            "logo.png": [
                "/app/backend/open_webui/static/logo.png",
                "/app/build/static/logo.png",
            ],
            "splash.png": [
                "/app/backend/open_webui/static/splash.png",
                "/app/build/static/splash.png",
            ],
            "splash-dark.png": [
                "/app/backend/open_webui/static/splash-dark.png",
                "/app/build/static/splash-dark.png",
            ],
        }
        branding_fallbacks = {
            "favicon-96x96.png": "favicon.png",
            "apple-touch-icon.png": "logo.png",
            "splash.png": "logo.png",
            "splash-dark.png": "logo.png",
        }
        for source_name, targets in branding_files.items():
            source = os.path.join(branding_dir, source_name)
            if not os.path.isfile(source) and source_name in branding_fallbacks:
                source = os.path.join(branding_dir, branding_fallbacks[source_name])
            if os.path.isfile(source):
                for target in targets:
                    shutil.copyfile(source, target)

        custom_css = os.path.join(branding_dir, "custom.css")
        custom_css_targets = [
            "/app/backend/open_webui/static/custom.css",
            "/app/build/static/custom.css",
        ]
        if os.path.isfile(custom_css):
            for target in custom_css_targets:
                shutil.copyfile(custom_css, target)
        else:
            for target in custom_css_targets:
                with open(target, "w") as file:
                    file.write(
                        """
        img.sidebar-new-chat-icon {
            width: 1.5rem !important;
            height: 1.5rem !important;
            box-sizing: border-box !important;
            padding-left: 1.5rem !important;
            overflow: hidden !important;
            border-radius: 3px !important;
            background: linear-gradient(96deg, #ff8a3d 0%, #ff5c3c 52%, #ff3f7c 100%) !important;
            box-shadow: 0 0 14px rgba(255, 92, 60, 0.45) !important;
        }

        #sidebar-webui-name,
        #auth-login-card .text-2xl.font-medium {
            background: linear-gradient(96deg, #ff8a3d 0%, #ff5c3c 52%, #ff3f7c 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent !important;
        }
        """
                    )

        index_file = "/app/build/index.html"
        if os.path.isfile(index_file):
            with open(index_file) as file:
                index_content = file.read()
            index_content = re.sub(
                r'href="/static/custom\.css(?:\?v=[^"]*)?"',
                'href="/static/custom.css?v=codeflare-mark-20260702"',
                index_content,
            )
            with open(index_file, "w") as file:
                file.write(index_content)

        model_metadata = {
            "capabilities": {
                "file_context": True,
                "vision": True,
                "file_upload": True,
                "web_search": True,
                "image_generation": False,
                "code_interpreter": False,
                "terminal": False,
                "citations": True,
                "status_updates": True,
                "builtin_tools": True,
            },
            "defaultFeatureIds": ["web_search"],
            "toolIds": [image_search_tool_id, "server:mcp:github"],
            "builtinTools": {
                "web_search": True,
                "image_generation": False,
                "code_interpreter": False,
                "memory": False,
                "chats": False,
                "notes": False,
                "knowledge": False,
                "channels": False,
                "tasks": False,
                "automations": False,
                "calendar": False,
            },
        }
        model_params = {
            "function_calling": "native",
            "stream_response": True,
            "stream_delta_chunk_size": 1,
            "reasoning_format": "none",
            "chat_template_kwargs": {
                "enable_thinking": False,
            },
        }

        async def build_oauth_client_info_blob(server_id, server_url, oauth_client_id, oauth_client_secret, oauth_scope):
            if not oauth_client_id or not oauth_client_secret:
                return None

            try:
                from open_webui.utils.oauth import encrypt_data, get_oauth_client_info_with_static_credentials

                class RegistrationRequest:
                    base_url = f"{webui_url}/"

                oauth_client_info = await get_oauth_client_info_with_static_credentials(
                    RegistrationRequest(),
                    f"mcp:{server_id}",
                    server_url,
                    oauth_client_id=oauth_client_id,
                    oauth_client_secret=oauth_client_secret,
                    oauth_scope=oauth_scope,
                )
                return encrypt_data(oauth_client_info.model_dump(mode="json"))
            except Exception as exc:
                print(f"WARNING: failed to build OAuth client metadata for MCP server {server_id}: {exc}")
                return None

        async def build_mcp_connections():
            github_oauth_info = await build_oauth_client_info_blob(
                "github",
                "https://api.githubcopilot.com/mcp/",
                os.getenv("GITHUB_MCP_OAUTH_CLIENT_ID", "").strip(),
                os.getenv("GITHUB_MCP_OAUTH_CLIENT_SECRET", "").strip(),
                os.getenv("GITHUB_MCP_OAUTH_SCOPE", "").strip(),
            )
            m365_oauth_info = await build_oauth_client_info_blob(
                "m365",
                "https://mcp.svc.cloud.microsoft/enterprise",
                os.getenv("M365_MCP_OAUTH_CLIENT_ID", "").strip(),
                os.getenv("M365_MCP_OAUTH_CLIENT_SECRET", "").strip(),
                os.getenv("M365_MCP_OAUTH_SCOPE", "").strip(),
            )

            github_info = {
                "id": "github",
                "name": "GitHub",
                "description": "GitHub remote MCP server with per-user OAuth authentication.",
                "oauth_scope": os.getenv("GITHUB_MCP_OAUTH_SCOPE", "").strip(),
                "oauth_resource_parameter": "omit",
            }
            if github_oauth_info:
                github_info["oauth_client_info"] = github_oauth_info

            m365_info = {
                "id": "m365",
                "name": "Microsoft 365",
                "description": "Microsoft MCP Server for Enterprise with delegated Microsoft 365 OAuth authentication.",
                "oauth_scope": os.getenv("M365_MCP_OAUTH_SCOPE", "").strip(),
                "oauth_resource_parameter": "auto",
            }
            if m365_oauth_info:
                m365_info["oauth_client_info"] = m365_oauth_info

            return [
                {
                    "type": "mcp",
                    "url": "https://api.githubcopilot.com/mcp/",
                    "spec_type": "url",
                    "spec": "",
                    "path": "openapi.json",
                    "auth_type": "oauth_2.1_static",
                    "headers": {
                        "X-MCP-Toolsets": os.getenv("GITHUB_MCP_TOOLSETS", "").strip(),
                    },
                    "key": "",
                    "config": {
                        "enable": True,
                        "access_grants": [public_read_grant],
                    },
                    "info": github_info,
                },
                {
                    "type": "mcp",
                    "url": "https://mcp.svc.cloud.microsoft/enterprise",
                    "spec_type": "url",
                    "spec": "",
                    "path": "openapi.json",
                    "auth_type": "oauth_2.1_static",
                    "headers": {},
                    "key": "",
                    "config": {
                        "enable": True,
                        "access_grants": [public_read_grant],
                    },
                    "info": m365_info,
                },
            ]

        mcp_connections = asyncio.run(build_mcp_connections())

        updates = {
            "webui.url": webui_url,
            "direct.enable": False,
            "ollama.enable": False,
            "openai.enable": True,
            "openai.api_base_urls": [gateway_base_url],
            "openai.api_keys": [gateway_api_key],
            "openai.api_configs": {
                "0": {
                    "enable": True,
                    "model_ids": ["dynamic/freestyler"],
                    "connection_type": "openai",
                    "provider": "llama.cpp",
                }
            },
            "models.base_models_cache": False,
            "models.default_metadata": model_metadata,
            "models.default_params": model_params,
            "task.title.enable": False,
            "task.tags.enable": False,
            "task.follow_up.enable": False,
            "web.search.enable": True,
            "web.search.engine": "searxng",
            "web.search.result_count": 5,
            "web.search.concurrent_requests": 10,
            "web.search.searxng_query_url": searxng_query_url,
            "web.search.searxng_language": "all",
            "web.search.confirmation.enable": False,
        }
        image_search_tool_content = textwrap.dedent(r'''
        import json
        import urllib.parse
        import urllib.request


        class Tools:
            def search_images(self, query: str, count: int = 5) -> str:
                """
                Search the web for images and return direct image URLs, thumbnail URLs, source pages, and metadata.
                :param query: Image search query.
                :param count: Maximum number of image results to return.
                :return: JSON object containing image search results.
                """
                count = max(1, min(int(count or 5), 10))
                params = urllib.parse.urlencode(
                    {
                        "q": query,
                        "categories": "images",
                        "format": "json",
                        "safesearch": "1",
                        "language": "all",
                        "image_proxy": "0",
                    }
                )
                url = f"http://searxng:8080/search?{params}"
                request = urllib.request.Request(
                    url,
                    headers={"User-Agent": "Open WebUI image_search tool"},
                )

                with urllib.request.urlopen(request, timeout=20) as response:
                    payload = json.loads(response.read().decode("utf-8"))

                results = []
                for item in payload.get("results", [])[:count]:
                    image_url = item.get("img_src") or item.get("thumbnail_src") or item.get("thumbnail") or ""
                    thumbnail_url = item.get("thumbnail_src") or item.get("thumbnail") or image_url
                    title = item.get("title") or item.get("source") or query
                    results.append(
                        {
                            "title": title,
                            "source_page_url": item.get("url", ""),
                            "image_url": image_url,
                            "thumbnail_url": thumbnail_url,
                            "resolution": item.get("resolution", ""),
                            "format": item.get("img_format", ""),
                            "source": item.get("source") or item.get("engine", ""),
                            "markdown_preview": f"![{title}]({thumbnail_url or image_url})"
                            if (thumbnail_url or image_url)
                            else "",
                        }
                    )

                return json.dumps({"query": query, "results": results}, ensure_ascii=False)
        ''').strip()
        image_search_tool_specs = [
            {
                "name": "search_images",
                "description": "Search the web for images and return direct image URLs, thumbnail URLs, source pages, and metadata.",
                "parameters": {
                    "type": "object",
                    "properties": {
                        "query": {
                            "type": "string",
                            "description": "Image search query.",
                        },
                        "count": {
                            "type": "integer",
                            "description": "Maximum number of image results to return, from 1 to 10.",
                            "default": 5,
                        },
                    },
                    "required": ["query"],
                },
            }
        ]
        force_tooling_function_content = textwrap.dedent(r'''
        """
        title: Force Freestyler Tooling
        version: 1.0.0
        """


        class Filter:
            GITHUB_GUIDANCE = """GitHub MCP defaults:
        - Canonical owner/user: nikolanovoselec.
        - If the user writes nikolanovoslec, treat it as a typo for nikolanovoselec.
        - To list the user's repositories, call github_search_repositories with query `owner:nikolanovoselec`, perPage 100, minimal_output true.
        - For known repository tasks, do not use global repository search. Use the exact owner `nikolanovoselec` and the exact repo name.
        - Known repos include: codeflare, komodo, codeflare-inference-mesh.
        - To list open issues in a repo, call github_list_issues with owner `nikolanovoselec`, repo, state `OPEN`, and perPage 100.
        - To read one issue, call github_issue_read with method `get`, owner `nikolanovoselec`, repo, and issue_number.
        - To list open pull requests, call github_list_pull_requests with owner `nikolanovoselec`, repo, state `open`, and perPage 100.
        - Do not say GitHub access is unavailable when GitHub MCP tools are present. Use the GitHub MCP tools first."""

            def inlet(self, body: dict, __metadata__: dict = None) -> dict:
                if body.get("model") != "dynamic/freestyler":
                    return body

                params = body.setdefault("params", {})
                params["function_calling"] = "native"
                params["stream_response"] = True
                params["stream_delta_chunk_size"] = 1
                params["reasoning_format"] = "none"
                params["chat_template_kwargs"] = {"enable_thinking": False}

                body["reasoning_format"] = "none"
                chat_template_kwargs = body.setdefault("chat_template_kwargs", {})
                chat_template_kwargs["enable_thinking"] = False

                if isinstance(__metadata__, dict):
                    metadata_params = __metadata__.setdefault("params", {})
                    metadata_params["function_calling"] = "native"
                    metadata_params["stream_delta_chunk_size"] = 1
                    metadata_params["reasoning_format"] = "none"
                    metadata_params["chat_template_kwargs"] = {"enable_thinking": False}

                features = body.setdefault("features", {})
                features["web_search"] = True
                features["image_generation"] = False

                tool_ids = body.setdefault("tool_ids", [])
                if "image_search" not in tool_ids:
                    tool_ids.append("image_search")
                if "server:mcp:github" not in tool_ids:
                    tool_ids.append("server:mcp:github")

                messages = body.setdefault("messages", [])
                for message in messages:
                    content = message.get("content")
                    if isinstance(content, str):
                        message["content"] = content.replace("nikolanovoslec", "nikolanovoselec")

                if messages:
                    first_message = messages[0]
                    if first_message.get("role") == "system":
                        content = first_message.get("content") or ""
                        if "GitHub MCP defaults:" not in content:
                            first_message["content"] = f"{content}\n\n{self.GITHUB_GUIDANCE}".strip()
                    else:
                        messages.insert(0, {"role": "system", "content": self.GITHUB_GUIDANCE})

                if isinstance(__metadata__, dict):
                    metadata_tool_ids = __metadata__.setdefault("tool_ids", [])
                    if "server:mcp:github" not in metadata_tool_ids:
                        metadata_tool_ids.append("server:mcp:github")

                return body
        ''').strip()

        with sqlite3.connect(database) as connection:
            connection.execute(
                "CREATE TABLE IF NOT EXISTS config (key TEXT PRIMARY KEY, value JSON NOT NULL, updated_at BIGINT)"
            )
            for key, value in updates.items():
                connection.execute(
                    "INSERT OR IGNORE INTO config (key, value, updated_at) VALUES (?, ?, ?)",
                    (key, json.dumps(value), now),
                )
            connection.commit()

            existing_connections_row = connection.execute(
                "SELECT value FROM config WHERE key = ?",
                ("tool_server.connections",),
            ).fetchone()
            try:
                existing_connections = json.loads(existing_connections_row[0]) if existing_connections_row else []
            except Exception:
                existing_connections = []

            if not isinstance(existing_connections, list):
                existing_connections = []

            desired_by_id = {
                (server.get("info") or {}).get("id"): server
                for server in mcp_connections
                if (server.get("info") or {}).get("id")
            }
            merged_connections = []
            seen_connection_ids = set()
            for existing_connection in existing_connections:
                existing_info = existing_connection.get("info") or {}
                connection_id = existing_info.get("id")
                desired_connection = desired_by_id.get(connection_id)

                if desired_connection:
                    desired_info = desired_connection.get("info") or {}
                    if not desired_info.get("oauth_client_info") and existing_info.get("oauth_client_info"):
                        desired_info = {
                            **desired_info,
                            "oauth_client_info": existing_info["oauth_client_info"],
                        }

                    merged_connections.append(
                        {
                            **existing_connection,
                            **desired_connection,
                            "config": {
                                **(existing_connection.get("config") or {}),
                                **(desired_connection.get("config") or {}),
                            },
                            "info": {
                                **existing_info,
                                **desired_info,
                            },
                        }
                    )
                    seen_connection_ids.add(connection_id)
                else:
                    merged_connections.append(existing_connection)

            for connection_id, desired_connection in desired_by_id.items():
                if connection_id not in seen_connection_ids:
                    merged_connections.append(desired_connection)

            connection.execute(
                "INSERT OR REPLACE INTO config (key, value, updated_at) VALUES (?, ?, ?)",
                ("tool_server.connections", json.dumps(merged_connections), now),
            )
            connection.commit()

            def table_exists(table_name):
                row = connection.execute(
                    "SELECT 1 FROM sqlite_master WHERE type = 'table' AND name = ?",
                    (table_name,),
                ).fetchone()
                return row is not None

            admin_user = None
            if table_exists("user"):
                admin_user = connection.execute(
                    'SELECT id FROM "user" WHERE role = ? ORDER BY created_at ASC LIMIT 1',
                    ("admin",),
                ).fetchone()

            if admin_user and table_exists("tool"):
                admin_user_id = admin_user[0]
                connection.execute(
                    "INSERT INTO tool (id, user_id, name, content, specs, meta, valves, updated_at, created_at) "
                    "VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?) "
                    "ON CONFLICT(id) DO UPDATE SET user_id = excluded.user_id, name = excluded.name, "
                    "content = excluded.content, specs = excluded.specs, meta = excluded.meta, "
                    "valves = excluded.valves, updated_at = excluded.updated_at",
                    (
                        image_search_tool_id,
                        admin_user_id,
                        "Image Search",
                        image_search_tool_content,
                        json.dumps(image_search_tool_specs),
                        json.dumps(
                            {
                                "description": "Search SearXNG image results and return image URLs.",
                                "manifest": {},
                                "has_user_valves": False,
                            }
                        ),
                        json.dumps({}),
                        now,
                        now,
                    ),
                )

                if table_exists("model"):
                    connection.execute(
                        "INSERT OR IGNORE INTO model "
                        "(id, user_id, base_model_id, name, params, meta, is_active, updated_at, created_at) "
                        "VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)",
                        (
                            model_id,
                            admin_user_id,
                            None,
                            model_id,
                            json.dumps(model_params),
                            json.dumps(model_metadata),
                            1,
                            now,
                            now,
                        ),
                    )

                if table_exists("access_grant"):
                    grants = [
                        ("open_webui_image_search_public_read", "tool", image_search_tool_id),
                        ("open_webui_freestyler_public_read", "model", model_id),
                    ]
                    for grant_id, resource_type, resource_id in grants:
                        connection.execute(
                            "INSERT OR IGNORE INTO access_grant "
                            "(id, resource_type, resource_id, principal_type, principal_id, permission, created_at) "
                            "VALUES (?, ?, ?, ?, ?, ?, ?)",
                            (grant_id, resource_type, resource_id, "user", "*", "read", now),
                        )

                if table_exists("function"):
                    connection.execute(
                        "INSERT INTO function (id, user_id, name, type, content, meta, valves, is_active, is_global, updated_at, created_at) "
                        "VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?, ?, ?) "
                        "ON CONFLICT(id) DO UPDATE SET user_id = excluded.user_id, name = excluded.name, "
                        "type = excluded.type, content = excluded.content, meta = excluded.meta, valves = excluded.valves, "
                        "is_active = excluded.is_active, is_global = excluded.is_global, updated_at = excluded.updated_at",
                        (
                            force_tooling_function_id,
                            admin_user_id,
                            "Force Freestyler Tooling",
                            "filter",
                            force_tooling_function_content,
                            json.dumps(
                                {
                                    "description": "Forces web search and image search tooling for dynamic/freestyler.",
                                    "manifest": {
                                        "title": "Force Freestyler Tooling",
                                        "version": "1.0.0",
                                    },
                                }
                            ),
                            json.dumps({}),
                            1,
                            1,
                            now,
                            now,
                        ),
                    )

                connection.commit()
        PY
        exec bash start.sh
    restart: unless-stopped

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: tools_open_webui_searxng
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    logging:
      driver: json-file
      options:
        max-size: 1m
        max-file: "1"
