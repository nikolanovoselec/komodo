services:
  flame:
    image: pawelmalak/flame:2.4.0
    container_name: tools_flame
    #dns:
    #  - 100.64.0.2
    #  - 192.168.5.162
    #  - 192.168.5.92
    volumes:
      - /docker/configs/flame:/app/data
    ports:
      - 5005:5005
    environment:
      - PASSWORD=${FLAME_PASSWORD}
    restart: unless-stopped