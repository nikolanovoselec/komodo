services:
  github-runner-codeflare_i:
    image: myoung34/github-runner:2.334.0-ubuntu-jammy
    container_name: tools_github_runner_codeflare_i
    #dns:
    #  - 100.64.0.2
    #  - 192.168.5.162
    #  - 192.168.5.92
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /docker/configs/github_runner/codeflare_i/work:/tmp/runner
      - /docker/configs/github_runner/codeflare_i/config:/etc/runner
    environment:
      REPO_URL: https://github.com/nikolanovoselec/codeflare
      ACCESS_TOKEN: ${GH_RUNNER_ACCESS_TOKEN}
      RUNNER_NAME: tools_github_runner_codeflare_i
      RUNNER_WORKDIR: /tmp/runner
      LABELS: tools_github_runner_codeflare
      DISABLE_AUTO_UPDATE: 'true'
    restart: unless-stopped
    network_mode: bridge