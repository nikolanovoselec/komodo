services:
  maintainerr:
    image: jorenn92/maintainerr:3.4.1
    container_name: servarr_maintainerr
    #dns:
    #  - 100.64.0.2
    #  - 192.168.5.162
    #  - 192.168.5.92
    volumes:
      - type: bind
        source: /docker/configs/maintainerr
        target: /opt/data
    environment:
      - TZ=Europe/Zurich
      - PUID=1026
      - PGID=100
    ports:
      - 6246:6246
    restart: unless-stopped
    network_mode: bridge
