services:
  gluetun:
    image: ghcr.io/qdm12/gluetun:v3.41.1
    container_name: servarr_qbittorrent_gluetun
    #dns:
    #  - 100.64.0.2
    #  - 192.168.5.162
    #  - 192.168.5.92
    cap_add:
      - NET_ADMIN
    devices:
    - /dev/net/tun:/dev/net/tun
    environment:
      - TZ=Europe/Zurich
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - FIREWALL_VPN_INPUT_PORTS=32323
      - FIREWALL_OUTBOUND_SUBNETS=192.168.2.0/24    # ← fixes the WebUI access
      - HEALTH_VPN_DURATION_INITIAL=30s             # ← gives WG handshake time to land
      - HEALTH_VPN_DURATION_ADDITION=10s
      - HEALTH_RESTART_VPN=off
    ports:
      - "8080:8080/tcp" # Qbittorrent WebUI
      - "32323:32323/tcp"
      - "32323:32323/udp"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /docker/configs/gluetun/10.conf:/gluetun/wireguard/wg0.conf:ro
#    labels:
#      deunhealth.restart.on.unhealthy: "true"
    restart: unless-stopped

  qbittorrent:
    image: linuxserver/qbittorrent:5.1.2-r2-ls415
    container_name: servarr_qbittorrent_client
    environment:
      - PUID=977
      - PGID=988
      - UMASK=002
      - TZ=Europe/Zurich
      - WEBUI_PORT=8080
      - TORRENTING_PORT=32323
    volumes:
      - /docker/configs/qBittorrent:/config
      - /mnt/unas/:/data
      #- /volume1/homes/nikola.novoselec/Drive/_OneDrive/Drive/Temp/qBittorrent:/watch
    network_mode: "service:gluetun"
#    depends_on:
#      gluetun:
#        condition: service_healthy
#    labels:
#      deunhealth.restart.on.unhealthy: "true"
    restart: unless-stopped
#    healthcheck: # https://github.com/qdm12/gluetun/issues/641#issuecomment-933856220
#      test: "curl -sf https://google.com  || exit 1"
#      interval: 1m
#      timeout: 10s
#      retries: 3

###########

  deunhealth:
    #build: .
    image: qmcgaw/deunhealth:latest
    container_name: servarr_qbittorrent_deunhealth
    network_mode: "none"
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=Europe/Zurich
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock