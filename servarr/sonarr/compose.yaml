services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls305
    container_name: servarr_sonarr
    #dns:
    #  - 100.64.0.2
    #  - 192.168.5.162
    #  - 192.168.5.92
    environment:
      - TZ=Europe/Zurich
      - PUID=1026
      - PGID=100
    volumes:
      - /docker/configs/sonarr:/config
      - /mnt/synology:/data
    ports:
      - 8988:8989
    restart: unless-stopped
    network_mode: bridge
