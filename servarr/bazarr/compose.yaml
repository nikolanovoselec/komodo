services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:v1.5.6-ls347
    container_name: servarr_bazarr
    #dns:
    #  - 100.64.0.2
    #  - 192.168.5.162
    #  - 192.168.5.92
    environment:
      - PUID=977
      - PGID=988
      - UMASK=002
      - TZ=Europe/Zurich
    volumes:
      - /docker/configs/bazarr:/config
      - /mnt/unas:/data
    ports:
      - 6767:6767
    restart: unless-stopped
    network_mode: bridge
