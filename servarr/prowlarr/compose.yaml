services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:2.3.0.5236-ls140
    container_name: servarr_prowlarr
    #dns:
    #  - 100.64.0.2
    #  - 192.168.5.162
    #  - 192.168.5.92
    environment:
      - TZ=Europe/Zurich
    volumes:
      - /docker/configs/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    network_mode: bridge
