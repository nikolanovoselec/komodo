services:
  radarr:
    image: lscr.io/linuxserver/radarr:6.1.1.10360-ls300
    container_name: servarr_radarr
    #dns:
    #  - 100.64.0.2
    #  - 192.168.5.162
    #  - 192.168.5.92
    environment:
      - TZ=Europe/Zurich
    volumes:
      - /docker/configs/radarr:/config
      - /mnt/unas:/data
    ports:
      - 8309:7878
    restart: unless-stopped
    network_mode: bridge
