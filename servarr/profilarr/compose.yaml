services:
    profilarr:
        image: santiagosayshey/profilarr:v1.1.4
        container_name: servarr_profilarr
        dns:
            - 100.64.0.2
            - 192.168.5.162
            - 192.168.5.92
        ports:
            - 6868:6868
        volumes:
            - /docker/configs/profilarr:/config # Replace with your actual path
        environment:
            - TZ=Europe/Zurich # Set your timezone
        restart: unless-stopped
