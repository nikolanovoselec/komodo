services:
  heimdall:
    image: lscr.io/linuxserver/heimdall:v2.7.6-ls340
    container_name: servarr_heimdall
    dns:
      - 100.64.0.2
      - 192.168.5.162
      - 192.168.5.92
      - 192.168.2.29
    environment:
      - TZ=Europe/Zurich
    volumes:
      - /docker/configs/heimdall/:/config
    ports:
      - 7140:80
    restart: unless-stopped
    network_mode: bridge
