services:
  huntarr:
    image: huntarr/huntarr:9.4.3
    container_name: servarr_huntarr
    dns:
      - 100.64.0.2
      - 192.168.5.162
      - 192.168.5.92
    restart: unless-stopped
    ports:
      - 9705:9705
    volumes:
      - /docker/configs/huntarr:/config
    environment:
      - TZ=Europe/Zurich
    network_mode: bridge
